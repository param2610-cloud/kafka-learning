apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script-config
  namespace: kafka-lab
data:
  order_spike.js: |
    import http from "k6/http";
    import { check } from "k6";
    import { Counter, Rate } from "k6/metrics";

    const totalRequests = Number(__ENV.TOTAL_REQUESTS || 1000000);
    const virtualUsers = Number(__ENV.VUS || 2000);
    const maxDuration = __ENV.MAX_DURATION || "20m";
    const uniqueUsers = Number(__ENV.UNIQUE_USERS || 1000);
    const orderBaseUrl = __ENV.ORDER_BASE_URL || "http://order-service.kafka-lab.svc.cluster.local:8000";

    const successfulOrders = new Counter("successful_orders");
    const failedOrders = new Counter("failed_orders");
    const partialFailures = new Counter("partial_failures");
    const hardFailureRate = new Rate("hard_failure_rate");

    export const options = {
      scenarios: {
        million_request_spike: {
          executor: "shared-iterations",
          vus: virtualUsers,
          iterations: totalRequests,
          maxDuration: maxDuration,
        },
      },
      thresholds: {
        hard_failure_rate: ["rate<0.30"],
        http_req_duration: ["p(95)<4000"],
      },
    };

    function buildOrderPayload(iteration) {
      const userId = `u-${(iteration % uniqueUsers) + 1}`;
      return JSON.stringify({
        user_id: userId,
        email: `${userId}@example.com`,
        items: [
          { product_id: "pencil", quantity: (iteration % 3) + 1 },
          { product_id: "notebook", quantity: 1 },
        ],
      });
    }

    export default function () {
      const response = http.post(`${orderBaseUrl}/orders`, buildOrderPayload(__ITER), {
        headers: { "Content-Type": "application/json" },
        timeout: "10s",
      });

      const responseOk = check(response, {
        "order endpoint returned 200": (r) => r.status === 200,
      });

      if (!responseOk) {
        failedOrders.add(1);
        hardFailureRate.add(1);
        return;
      }

      const body = response.json();
      const status = body && body.order ? body.order.status : "unknown";
      if (status === "processed") {
        successfulOrders.add(1);
        hardFailureRate.add(0);
      } else {
        partialFailures.add(1);
        hardFailureRate.add(1);
      }
    }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: load-orchestrator-sa
  namespace: kafka-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: load-orchestrator-role
  namespace: kafka-lab
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: load-orchestrator-rolebinding
  namespace: kafka-lab
subjects:
  - kind: ServiceAccount
    name: load-orchestrator-sa
    namespace: kafka-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: load-orchestrator-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-orchestrator
  namespace: kafka-lab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: load-orchestrator
  template:
    metadata:
      labels:
        app: load-orchestrator
    spec:
      serviceAccountName: load-orchestrator-sa
      containers:
        - name: load-orchestrator
          image: kafka-load-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: TARGET_NAMESPACE
              value: kafka-lab
          resources:
            requests:
              cpu: "2000m"
              memory: "4Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: load-orchestrator
  namespace: kafka-lab
spec:
  type: NodePort
  selector:
    app: load-orchestrator
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30081
