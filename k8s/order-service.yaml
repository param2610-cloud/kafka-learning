apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: kafka-lab
spec:
  replicas: 3
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: kafka-order-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: KAFKA_ENABLED
              value: "true"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092 
            - name: KAFKA_ORDER_CREATED_TOPIC
              value: orders.created
            - name: KAFKA_FALLBACK_SYNC
              value: "false"
            - name: INVENTORY_HTTP_PRECHECK_ENABLED
              value: "true"
            - name: INVENTORY_SERVICE_URL
              value: http://inventory-service:8002
            - name: INVENTORY_REDIS_RESERVATION_ENABLED
              value: "true"
            - name: DOWNSTREAM_MAX_RETRIES
              value: "5"
            - name: DOWNSTREAM_INITIAL_BACKOFF_SECONDS
              value: "0.2"
            - name: DOWNSTREAM_BACKOFF_MULTIPLIER
              value: "2.0"
            - name: DOWNSTREAM_MAX_BACKOFF_SECONDS
              value: "3.0"
            - name: DOWNSTREAM_REQUEST_TIMEOUT_SECONDS
              value: "1.5"
            - name: REDIS_ENABLED
              value: "true"
            - name: REDIS_PREFER_CACHE
              value: "true"
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "500Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: kafka-lab
spec:
  selector:
    app: order-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
