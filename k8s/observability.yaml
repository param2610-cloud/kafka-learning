apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: kafka-lab
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: kafka-lab-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: kafka-lab
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: order-service|email-service|inventory-service|load-orchestrator
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: 8000|8001|8002|8080
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: job
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
  namespace: kafka-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-k8s-discovery-role
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-k8s-discovery-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-k8s-discovery-role
subjects:
  - kind: ServiceAccount
    name: prometheus-sa
    namespace: kafka-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: kafka-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus-sa
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/
            - name: prometheus-data
              mountPath: /prometheus
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "800m"
              memory: "1Gi"
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: kafka-lab
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: kafka-lab
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.kafka-lab.svc.cluster.local:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: kafka-lab
data:
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: kafka-lab-dashboards
        orgId: 1
        folder: "Kafka Lab"
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: kafka-lab
data:
  services-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}},
          "targets": [
            {
              "expr": "(sum by (job) (rate(http_requests_total{job=\"order-service\",handler!~\"/health|/metrics\"}[1m]))) or (sum by (job) (rate(order_events_processed_total{job=~\"email-service|inventory-service\"}[1m])))",
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ],
          "title": "All Services Throughput by Service (/s)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 8},
          "id": 2,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}},
          "targets": [
            {
              "expr": "(sum(rate(order_events_processed_total{job=\"email-service\"}[1m])) or on() vector(0)) + (sum(rate(api_calls_total{job=\"email-service\",endpoint=\"confirm-order\",status=\"success\"}[1m])) or on() vector(0))",
              "legendFormat": "email-service (kafka + api)",
              "refId": "A"
            }
          ],
          "title": "Email Service Processing Rate (evt/s + api/s)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 8},
          "id": 3,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}},
          "targets": [
            {
              "expr": "(sum(rate(order_events_processed_total{job=\"inventory-service\"}[1m])) or on() vector(0)) + (sum(rate(api_calls_total{job=\"inventory-service\",endpoint=\"reduce-stock\",status=\"success\"}[1m])) or on() vector(0))",
              "legendFormat": "inventory-service (kafka + api)",
              "refId": "A"
            }
          ],
          "title": "Inventory Service Processing Rate (evt/s + api/s)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 8},
          "id": 4,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"order-service\",handler!~\"/health|/metrics\"}[1m])) or on() vector(0)",
              "legendFormat": "order-service",
              "refId": "A"
            }
          ],
          "title": "Order Service Request Rate (req/s)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16},
          "id": 10,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}},
          "targets": [
            {
              "expr": "sum(rate(api_calls_total{job=\"order-service\",status=\"success\"}[1m])) or on() vector(0)",
              "legendFormat": "order-service api calls/s",
              "refId": "A"
            },
            {
              "expr": "sum(rate(api_calls_total{job=\"email-service\",status=\"success\"}[1m])) or on() vector(0)",
              "legendFormat": "email-service api calls/s",
              "refId": "B"
            },
            {
              "expr": "sum(rate(api_calls_total{job=\"inventory-service\",status=\"success\"}[1m])) or on() vector(0)",
              "legendFormat": "inventory-service api calls/s",
              "refId": "C"
            }
          ],
          "title": "API Request Processing Rate (api/s)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "cores"}, "overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 24},
          "id": 5,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}},
          "targets": [
            {
              "expr": "sum by (job) (rate(process_cpu_seconds_total{job=~\"order-service|email-service|inventory-service\"}[1m]))",
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ],
          "title": "CPU Usage by Service (cores)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 32},
          "id": 8,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}},
          "targets": [
            {
              "expr": "sum(api_calls_total{job=\"order-service\",status=\"success\"}) or on() vector(0)",
              "legendFormat": "order-service api total",
              "refId": "A"
            },
            {
              "expr": "sum(api_calls_total{job=\"email-service\",status=\"success\"}) or on() vector(0)",
              "legendFormat": "email-service api total",
              "refId": "B"
            },
            {
              "expr": "sum(api_calls_total{job=\"inventory-service\",status=\"success\"}) or on() vector(0)",
              "legendFormat": "inventory-service api total",
              "refId": "C"
            },
            {
              "expr": "sum(api_calls_total{job=\"order-service\",status=\"failure\"}) or on() vector(0)",
              "legendFormat": "order-service api failures",
              "refId": "D"
            },
            {
              "expr": "sum(api_calls_total{job=\"email-service\",status=\"failure\"}) or on() vector(0)",
              "legendFormat": "email-service api failures",
              "refId": "E"
            },
            {
              "expr": "sum(api_calls_total{job=\"inventory-service\",status=\"failure\"}) or on() vector(0)",
              "legendFormat": "inventory-service api failures",
              "refId": "F"
            }
          ],
          "title": "API Call Total Counts (Success & Failures)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 40},
          "id": 9,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}},
          "targets": [
            {
              "expr": "sum(order_events_produced_total{job=\"order-service\"})",
              "legendFormat": "order produced total",
              "refId": "A"
            },
            {
              "expr": "sum(order_events_processed_total{job=\"email-service\"})",
              "legendFormat": "email kafka processed total",
              "refId": "B"
            },
            {
              "expr": "sum(order_events_processed_total{job=\"inventory-service\"})",
              "legendFormat": "inventory kafka processed total",
              "refId": "C"
            },
            {
              "expr": "sum(api_calls_total{job=\"email-service\",status=\"success\"})",
              "legendFormat": "email api total",
              "refId": "D"
            },
            {
              "expr": "sum(api_calls_total{job=\"inventory-service\",status=\"success\"})",
              "legendFormat": "inventory api total",
              "refId": "E"
            },
            {
              "expr": "clamp_min(sum(order_events_produced_total{job=\"order-service\"}) - sum(order_events_processed_total{job=\"email-service\"}), 0)",
              "legendFormat": "email backlog (kafka)",
              "refId": "F"
            },
            {
              "expr": "clamp_min(sum(order_events_produced_total{job=\"order-service\"}) - sum(order_events_processed_total{job=\"inventory-service\"}), 0)",
              "legendFormat": "inventory backlog (kafka)",
              "refId": "G"
            }
          ],
          "title": "Hybrid Event Resolution Counts (Kafka + API)",
          "type": "timeseries"
        }
      ],
      "refresh": "5s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["kafka-lab", "chaos"],
      "templating": {"list": []},
      "time": {"from": "now-15m", "to": "now"},
      "timepicker": {},
      "timezone": "",
      "title": "Kafka Lab Service Health",
      "uid": "kafka-lab-services",
      "version": 9,
      "weekStart": ""
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: kafka-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: kafka-lab
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
