apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: kafka-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: kafka-inventory-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          env:
            - name: KAFKA_ENABLED
              value: "false"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: KAFKA_ORDER_CREATED_TOPIC
              value: orders.created
            - name: KAFKA_AUTO_OFFSET_RESET
              value: earliest
            - name: INVENTORY_DB_CALL_DELAY_SECONDS
              value: "0.03"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: kafka-lab
spec:
  selector:
    app: inventory-service
  ports:
    - name: http
      port: 8002
      targetPort: 8002
