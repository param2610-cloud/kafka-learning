apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda-console
  namespace: kafka-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda-console
  template:
    metadata:
      labels:
        app: redpanda-console
    spec:
      containers:
        - name: redpanda-console
          image: redpandadata/console:v2.6.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: KAFKA_CLIENT_ID
              value: redpanda-console
            - name: KAFKA_TLS_ENABLED
              value: "false"
            - name: KAFKA_SASL_ENABLED
              value: "false"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda-console
  namespace: kafka-lab
spec:
  type: NodePort
  selector:
    app: redpanda-console
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30082
