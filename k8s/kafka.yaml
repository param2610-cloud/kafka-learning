apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: kafka-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9092
            - containerPort: 9093
          env:
            - name: CLUSTER_ID
              value: "gIF5VjHaT3OVltlr3sPbqw"
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: controller,broker
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:9092,CONTROLLER://:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka.kafka-lab.svc.cluster.local:9092
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@localhost:9093
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_NUM_PARTITIONS
              value: "16"
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: kafka-lab
spec:
  selector:
    app: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092

---
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topic-init
  namespace: kafka-lab
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kafka-topic-init
          image: apache/kafka:3.7.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              TOPIC="orders.created"
              TARGET_PARTITIONS=16
              BS="kafka:9092"

              /opt/kafka/bin/kafka-topics.sh \
                --bootstrap-server ${BS} \
                --create \
                --if-not-exists \
                --topic ${TOPIC} \
                --partitions ${TARGET_PARTITIONS} \
                --replication-factor 1

              CURRENT_PARTITIONS=$(
                /opt/kafka/bin/kafka-topics.sh \
                  --bootstrap-server ${BS} \
                  --describe \
                  --topic ${TOPIC} | grep -m1 "PartitionCount:" | sed -E 's/.*PartitionCount:([0-9]+).*/\1/'
              )

              if [ -n "${CURRENT_PARTITIONS}" ] && [ "${CURRENT_PARTITIONS}" -lt "${TARGET_PARTITIONS}" ]; then
                /opt/kafka/bin/kafka-topics.sh \
                  --bootstrap-server ${BS} \
                  --alter \
                  --topic ${TOPIC} \
                  --partitions ${TARGET_PARTITIONS}
              fi