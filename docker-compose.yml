services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes

  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_CFG_NUM_PARTITIONS: "16"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  kafka-init:
    image: bitnami/kafka:3.7
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      /bin/sh -c "
      TOPIC=orders.created;
      TARGET_PARTITIONS=16;
      BS=kafka:9092;
      /opt/bitnami/kafka/bin/kafka-topics.sh
      --bootstrap-server $${BS}
      --create
      --if-not-exists
      --topic $${TOPIC}
      --partitions $${TARGET_PARTITIONS}
      --replication-factor 1;
      CURRENT_PARTITIONS=$$(/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server $${BS} --describe --topic $${TOPIC} | grep -o 'PartitionCount: [0-9]*' | head -n1 | awk '{print $$2}');
      if [ -n $${CURRENT_PARTITIONS} ] && [ $${CURRENT_PARTITIONS} -lt $${TARGET_PARTITIONS} ]; then
      /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server $${BS} --alter --topic $${TOPIC} --partitions $${TARGET_PARTITIONS};
      fi
      "
    restart: "no"

  email-service:
    build:
      context: ./email-service
    container_name: email-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ORDER_CREATED_TOPIC: orders.created
      EMAIL_PROVIDER_API_DELAY_SECONDS: "0.12"
      REDIS_ENABLED: "false"
      REDIS_PREFER_CACHE: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "8001:8001"

  inventory-service:
    build:
      context: ./inventory-service
    container_name: inventory-service
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ORDER_CREATED_TOPIC: orders.created
      INVENTORY_DB_CALL_DELAY_SECONDS: "0.03"
      REDIS_PREFER_CACHE: "true"
      REDIS_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "8002:8002"

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      email-service:
        condition: service_started
      inventory-service:
        condition: service_started
    environment:
      EMAIL_SERVICE_URL: http://email-service:8001
      INVENTORY_SERVICE_URL: http://inventory-service:8002
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ORDER_CREATED_TOPIC: orders.created
      KAFKA_FALLBACK_SYNC: "false"
      DOWNSTREAM_MAX_RETRIES: "4"
      DOWNSTREAM_INITIAL_BACKOFF_SECONDS: "0.1"
      DOWNSTREAM_BACKOFF_MULTIPLIER: "2.0"
      DOWNSTREAM_MAX_BACKOFF_SECONDS: "2.0"
      DOWNSTREAM_REQUEST_TIMEOUT_SECONDS: "2.0"
      REDIS_ENABLED: "false"
      REDIS_PREFER_CACHE: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "8000:8000"
